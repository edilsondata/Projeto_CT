{% extends "atendimentos/base.html" %}
{% block titulo %}Trocar Senha{% endblock %}
{% block conteudo %}
<div class="page-title"><i class="ti ti-lock"></i> Trocar Minha Senha</div>
<div class="card" style="max-width:480px">
  <form method="post">
    {% csrf_token %}
    <label>Senha atual *</label>
    <input type="password" name="senha_atual" required placeholder="Digite sua senha atual">
    <label>Nova senha *</label>
    <input type="password" name="nova_senha" required placeholder="Digite a nova senha">
    <label>Confirmar nova senha *</label>
    <input type="password" name="confirmar" required placeholder="Repita a nova senha">
    <div class="btn-row">
      <a href="/" class="btn-ghost"><i class="ti ti-arrow-left"></i> Cancelar</a>
      <button type="submit" class="btn-success"><i class="ti ti-lock-check"></i> Alterar Senha</button>
    </div>
  </form>
</div>
{% endblock %}
